<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Campo Minado</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Campo Minado</h1>
    </header>

    <main>
        <section>
            <h2>Dificuldades disponíveis</h2>

            <input type="radio" value="facil" id="dificuldade1" name="dificuldade">
            <label for="dificuldade1">Fácil: 10x10 com 10 minas</label><br>

            <input type="radio" value="medio" id="dificuldade2" name="dificuldade">
            <label for="dificuldade2">Médio: 16x16 com 40 minas</label><br>

            <input type="radio" value="dificil" id="dificuldade3" name="dificuldade">
            <label for="dificuldade3">Difícil: 20x20 com 80 minas</label><br>
        </section>

        <section>
            <button id="iniciar-jogo">Iniciar Jogo</button>
        </section>

        <section id="area-jogo" class="escondido">
            <h2>Tabuleiro</h2>
            <div id="tabuleiro"></div>

            <h2>Status do jogo</h2>
            <p>Minas restantes: <span id="minas-restantes">0</span></p>
            <p>Tempo: <span id="tempo">0</span> segundos</p>
            <p id="mensagem"></p>

            <button id="reiniciar-jogo">Reiniciar Jogo</button>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
